<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKETCH — Outil de Wireframing</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a1a'/><path d='M8 22 L20 10 L24 14 L12 26 L7 27 Z' fill='%23ffffff'/><path d='M20 10 L23 7 L25 9 L24 14 Z' fill='%23aaaaaa'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   SKETCH — Wireframe Tool · Soft Paper Aesthetic
   ============================================================ */
:root {
  --paper: #f5f2ec;
  --paper-2: #ede9e0;
  --paper-3: #e4dfd4;
  --ink: #1a1714;
  --ink-2: #4a4540;
  --ink-3: #8a857e;
  --ink-4: #b8b3ac;
  --accent: #2563eb;
  --accent-light: rgba(37,99,235,0.1);
  --accent-2: #dc2626;
  --wire: #c8c3bc;
  --shadow: 0 2px 12px rgba(26,23,20,0.08);
  --shadow-lg: 0 8px 32px rgba(26,23,20,0.12);
  --radius: 6px;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --panel: 240px;
  --header: 48px;
  --sel-color: #2563eb;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: var(--font); background: var(--paper); color: var(--ink); user-select: none; }

/* ============================================================ LAYOUT */
.app { display: grid; grid-template-rows: var(--header) 1fr; grid-template-columns: var(--panel) 1fr 260px; height: 100vh; }

/* ============================================================ HEADER */
.header { grid-column: 1 / -1; background: var(--ink); display: flex; align-items: center; padding: 0 1rem; gap: 1rem; z-index: 100; }
.logo { font-family: var(--mono); font-size: 0.85rem; font-weight: 500; color: #fff; letter-spacing: 0.15em; margin-right: 1rem; display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 20px; height: 20px; border: 2px solid var(--accent); border-radius: 4px; display: flex; align-items: center; justify-content: center; }
.logo-icon::after { content: ''; width: 8px; height: 8px; background: var(--accent); border-radius: 2px; }

.header-sep { width: 1px; height: 24px; background: rgba(255,255,255,0.12); }

.tool-group { display: flex; gap: 2px; }
.tool-btn { background: transparent; border: none; color: rgba(255,255,255,0.5); width: 34px; height: 34px; border-radius: var(--radius); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; position: relative; font-size: 0.7rem; font-family: var(--mono); }
.tool-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
.tool-btn.active { background: var(--accent); color: #fff; }
.tool-btn svg { pointer-events: none; }
.tool-tip { position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); background: var(--ink-2); color: #fff; font-size: 0.65rem; font-family: var(--mono); white-space: nowrap; padding: 3px 8px; border-radius: 4px; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 999; }
.tool-btn:hover .tool-tip { opacity: 1; }

.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.zoom-display { font-family: var(--mono); font-size: 0.72rem; color: rgba(255,255,255,0.4); min-width: 44px; text-align: center; }
.hbtn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); padding: 6px 14px; border-radius: var(--radius); font-family: var(--font); font-size: 0.75rem; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.hbtn:hover { background: rgba(255,255,255,0.14); color: #fff; }
.hbtn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.hbtn.primary:hover { background: #1d4ed8; }

/* ============================================================ LEFT PANEL */
.left-panel { background: var(--paper-2); border-right: 1px solid var(--wire); overflow-y: auto; overflow-x: hidden; }
.panel-section { padding: 12px; border-bottom: 1px solid var(--wire); }
.panel-title { font-family: var(--mono); font-size: 0.62rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px; }

.comp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.comp-item { background: var(--paper); border: 1px solid var(--wire); border-radius: var(--radius); padding: 8px 6px; cursor: grab; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: all 0.15s; }
.comp-item:hover { border-color: var(--accent); background: var(--accent-light); transform: translateY(-1px); box-shadow: var(--shadow); }
.comp-item:active { cursor: grabbing; transform: translateY(0); }
.comp-preview { width: 100%; height: 32px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.comp-label { font-family: var(--mono); font-size: 0.62rem; color: var(--ink-3); text-align: center; }

/* Component previews */
.prev-btn { width: 80%; height: 20px; background: var(--ink-4); border-radius: 3px; }
.prev-input { width: 80%; height: 20px; border: 1.5px solid var(--ink-4); border-radius: 3px; background: transparent; }
.prev-text { width: 85%; display: flex; flex-direction: column; gap: 3px; }
.prev-text span { display: block; height: 4px; background: var(--ink-4); border-radius: 2px; }
.prev-text span:nth-child(2) { width: 75%; }
.prev-text span:nth-child(3) { width: 55%; }
.prev-image { width: 80%; height: 26px; border: 1.5px solid var(--ink-4); border-radius: 3px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.prev-image::after { content: ''; position: absolute; width: 40%; aspect-ratio: 1; border-radius: 50%; background: var(--ink-4); top: 4px; left: 50%; transform: translateX(-50%); }
.prev-image::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 45%; background: var(--ink-4); }
.prev-nav { width: 90%; height: 14px; background: var(--ink-4); border-radius: 2px; }
.prev-card { width: 80%; height: 24px; border: 1.5px solid var(--ink-4); border-radius: 4px; background: transparent; }
.prev-table { width: 85%; display: flex; flex-direction: column; gap: 2px; }
.prev-table span { display: block; height: 5px; background: var(--ink-4); border-radius: 1px; }
.prev-table span:first-child { background: var(--ink-3); }
.prev-modal { width: 65%; height: 24px; border: 1.5px solid var(--ink-3); border-radius: 4px; box-shadow: 2px 2px 0 var(--ink-4); }
.prev-form { width: 80%; display: flex; flex-direction: column; gap: 3px; }
.prev-form span { display: block; height: 8px; border: 1px solid var(--ink-4); border-radius: 2px; }
.prev-toggle { width: 28px; height: 14px; border: 1.5px solid var(--ink-3); border-radius: 7px; position: relative; }
.prev-toggle::after { content: ''; position: absolute; width: 9px; height: 9px; background: var(--ink-3); border-radius: 50%; top: 1px; left: 2px; }
.prev-check { display: flex; gap: 4px; align-items: center; }
.prev-check span { width: 10px; height: 10px; border: 1.5px solid var(--ink-4); border-radius: 2px; }
.prev-avatar { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--ink-4); }
.prev-badge { width: 28px; height: 12px; background: var(--ink-4); border-radius: 6px; }
.prev-divider { width: 80%; height: 1.5px; background: var(--ink-4); }
.prev-progress { width: 80%; height: 8px; border: 1.5px solid var(--ink-4); border-radius: 4px; overflow: hidden; position: relative; }
.prev-progress::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 60%; background: var(--ink-3); }

/* ============================================================ CANVAS */
.canvas-area { background: var(--paper-3); overflow: hidden; position: relative; cursor: default; }
.canvas-area.tool-text { cursor: text; }
.canvas-area.tool-select { cursor: default; }
.canvas-area.tool-pan { cursor: grab; }
.canvas-area.tool-pan.panning { cursor: grabbing; }

.canvas-bg { position: absolute; inset: 0; pointer-events: none; }

#mainCanvas { position: absolute; top: 0; left: 0; }
.canvas-overlay { position: absolute; top: 0; left: 0; pointer-events: none; }

/* Frame label */
.frame-label { position: absolute; font-family: var(--mono); font-size: 0.65rem; color: var(--ink-3); pointer-events: none; transform-origin: top left; }

/* ============================================================ RIGHT PANEL */
.right-panel { background: var(--paper-2); border-left: 1px solid var(--wire); overflow-y: auto; overflow-x: hidden; }
.prop-section { padding: 12px; border-bottom: 1px solid var(--wire); }
.prop-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 8px; }
.prop-row:last-child { margin-bottom: 0; }
.prop-label { font-family: var(--mono); font-size: 0.68rem; color: var(--ink-3); white-space: nowrap; min-width: 50px; }
.prop-input { background: var(--paper); border: 1px solid var(--wire); color: var(--ink); padding: 5px 8px; border-radius: 4px; font-family: var(--mono); font-size: 0.72rem; width: 100%; outline: none; transition: border-color 0.15s; }
.prop-input:focus { border-color: var(--accent); }
.prop-input-sm { width: 60px; flex-shrink: 0; }
.prop-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
.prop-row-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 4px; margin-bottom: 8px; }

.color-preview { width: 24px; height: 24px; border-radius: 4px; border: 1px solid var(--wire); cursor: pointer; flex-shrink: 0; }
input[type="color"] { opacity: 0; position: absolute; pointer-events: none; }

.align-btns { display: flex; gap: 3px; }
.align-btn { background: var(--paper); border: 1px solid var(--wire); color: var(--ink-3); width: 26px; height: 26px; border-radius: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; transition: all 0.15s; }
.align-btn:hover { border-color: var(--accent); color: var(--accent); }

.no-selection { padding: 24px 16px; text-align: center; }
.no-sel-icon { font-size: 2rem; margin-bottom: 8px; opacity: 0.3; }
.no-sel-text { font-size: 0.78rem; color: var(--ink-3); line-height: 1.5; }

/* Layers */
.layer-item { display: flex; align-items: center; gap: 6px; padding: 5px 8px; border-radius: 4px; cursor: pointer; transition: background 0.12s; font-size: 0.75rem; }
.layer-item:hover { background: var(--paper-3); }
.layer-item.selected { background: var(--accent-light); color: var(--accent); }
.layer-icon { font-size: 0.7rem; opacity: 0.5; width: 14px; text-align: center; }
.layer-name { flex: 1; font-family: var(--mono); font-size: 0.68rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.layer-vis { opacity: 0.4; cursor: pointer; font-size: 0.65rem; }
.layer-vis:hover { opacity: 1; }

/* ============================================================ CANVAS ELEMENTS */
.wire-el { position: absolute; box-sizing: border-box; cursor: move; }
.wire-el.selected .el-inner { outline: 2px solid var(--sel-color) !important; outline-offset: 1px; }
.wire-el.selected .resize-handle { display: block; }

.el-inner { width: 100%; height: 100%; position: relative; pointer-events: none; }

/* Resize handles */
.resize-handle { display: none; position: absolute; width: 8px; height: 8px; background: #fff; border: 2px solid var(--sel-color); border-radius: 2px; z-index: 10; }
.rh-nw { top: -4px; left: -4px; cursor: nw-resize; }
.rh-n  { top: -4px; left: calc(50% - 4px); cursor: n-resize; }
.rh-ne { top: -4px; right: -4px; cursor: ne-resize; }
.rh-e  { top: calc(50% - 4px); right: -4px; cursor: e-resize; }
.rh-se { bottom: -4px; right: -4px; cursor: se-resize; }
.rh-s  { bottom: -4px; left: calc(50% - 4px); cursor: s-resize; }
.rh-sw { bottom: -4px; left: -4px; cursor: sw-resize; }
.rh-w  { top: calc(50% - 4px); left: -4px; cursor: w-resize; }

/* ============================================================ ELEMENT STYLES */
/* Button */
.wf-btn { width: 100%; height: 100%; background: var(--ink-4); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 0.72rem; color: var(--ink-2); }
/* Input */
.wf-input { width: 100%; height: 100%; border: 1.5px solid var(--ink-4); border-radius: 4px; background: var(--paper); display: flex; align-items: center; padding: 0 8px; font-family: var(--mono); font-size: 0.72rem; color: var(--ink-3); }
/* Text */
.wf-text { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: flex-start; gap: 5px; padding: 4px 0; }
.wf-text span { display: block; height: 8px; background: var(--ink-4); border-radius: 2px; }
.wf-text span:nth-child(2) { width: 80%; }
.wf-text span:nth-child(3) { width: 60%; }
/* Image */
.wf-image { width: 100%; height: 100%; border: 1.5px solid var(--ink-4); border-radius: 4px; background: var(--paper-3); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
.wf-image::after { content: '⬡'; font-size: 1.5rem; color: var(--ink-4); }
/* Nav */
.wf-nav { width: 100%; height: 100%; background: var(--ink-4); border-radius: 3px; display: flex; align-items: center; padding: 0 12px; gap: 16px; }
.wf-nav span { display: block; height: 6px; width: 40px; background: rgba(255,255,255,0.5); border-radius: 2px; }
.wf-nav span:first-child { width: 60px; background: rgba(255,255,255,0.8); }
/* Card */
.wf-card { width: 100%; height: 100%; border: 1.5px solid var(--ink-4); border-radius: 6px; background: var(--paper); display: flex; flex-direction: column; overflow: hidden; }
.wf-card-img { flex: 1; background: var(--paper-3); border-bottom: 1px solid var(--wire); }
.wf-card-body { padding: 8px; display: flex; flex-direction: column; gap: 4px; }
.wf-card-body span { display: block; height: 5px; background: var(--ink-4); border-radius: 2px; }
.wf-card-body span:nth-child(2) { width: 70%; }
/* Table */
.wf-table { width: 100%; height: 100%; border: 1.5px solid var(--ink-4); border-radius: 4px; overflow: hidden; display: flex; flex-direction: column; }
.wf-table-row { display: flex; border-bottom: 1px solid var(--wire); flex: 1; }
.wf-table-row:first-child { background: var(--ink-4); }
.wf-table-cell { flex: 1; border-right: 1px solid var(--wire); display: flex; align-items: center; padding: 0 6px; }
.wf-table-cell::after { content: ''; display: block; height: 4px; background: rgba(255,255,255,0.6); border-radius: 2px; width: 70%; }
.wf-table-row:not(:first-child) .wf-table-cell::after { background: var(--ink-4); }
/* Modal */
.wf-modal { width: 100%; height: 100%; border: 1.5px solid var(--ink-3); border-radius: 6px; background: var(--paper); box-shadow: 4px 4px 0 var(--ink-4); display: flex; flex-direction: column; }
.wf-modal-hdr { background: var(--ink-4); padding: 6px 10px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--wire); }
.wf-modal-hdr span { display: block; height: 5px; flex: 1; background: rgba(255,255,255,0.6); border-radius: 2px; }
.wf-modal-hdr::after { content: '✕'; font-size: 0.6rem; color: rgba(255,255,255,0.6); margin-left: auto; }
.wf-modal-body { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 5px; }
.wf-modal-body span { display: block; height: 5px; background: var(--ink-4); border-radius: 2px; }
.wf-modal-body span:nth-child(2) { width: 80%; }
/* Heading */
.wf-heading { width: 100%; height: 100%; display: flex; align-items: center; }
.wf-heading span { display: block; height: 12px; width: 70%; background: var(--ink-3); border-radius: 3px; }
/* Frame */
.wf-frame { width: 100%; height: 100%; border: 2px solid var(--ink-3); border-radius: 6px; background: transparent; position: relative; }
.wf-frame-label { position: absolute; top: -18px; left: 0; font-family: var(--mono); font-size: 0.65rem; color: var(--ink-3); }
/* Rectangle */
.wf-rect { width: 100%; height: 100%; border: 1.5px solid var(--ink-4); border-radius: 4px; background: var(--paper-3); }
/* Toggle */
.wf-toggle { display: flex; align-items: center; gap: 8px; height: 100%; padding: 0 4px; }
.wf-toggle-track { width: 32px; height: 18px; border: 1.5px solid var(--ink-3); border-radius: 9px; position: relative; flex-shrink: 0; }
.wf-toggle-thumb { position: absolute; width: 12px; height: 12px; background: var(--ink-3); border-radius: 50%; top: 1px; left: 2px; }
.wf-toggle-lbl { font-family: var(--mono); font-size: 0.65rem; color: var(--ink-3); }
/* Checkbox */
.wf-checkbox { display: flex; align-items: center; gap: 8px; height: 100%; padding: 0 4px; }
.wf-checkbox-box { width: 14px; height: 14px; border: 1.5px solid var(--ink-3); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.55rem; color: var(--ink-3); }
.wf-checkbox-lbl { font-family: var(--mono); font-size: 0.65rem; color: var(--ink-3); }
/* Avatar */
.wf-avatar { width: 100%; height: 100%; border-radius: 50%; border: 1.5px solid var(--ink-4); background: var(--paper-3); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--ink-4); overflow: hidden; }
/* Badge */
.wf-badge { width: 100%; height: 100%; background: var(--ink-4); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 0.6rem; color: rgba(255,255,255,0.7); }
/* Divider */
.wf-divider { width: 100%; height: 100%; display: flex; align-items: center; }
.wf-divider::after { content: ''; display: block; width: 100%; height: 1.5px; background: var(--ink-4); }
/* Progress */
.wf-progress { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
.wf-progress-track { width: 100%; height: 8px; border: 1.5px solid var(--ink-4); border-radius: 4px; overflow: hidden; }
.wf-progress-bar { height: 100%; width: 65%; background: var(--ink-3); }
/* Sticky note */
.wf-note { width: 100%; height: 100%; background: #fef9c3; border: 1px solid #fde047; border-radius: 3px; padding: 8px; font-family: var(--mono); font-size: 0.65rem; color: #713f12; box-shadow: 2px 2px 0 #fde047; overflow: hidden; }

/* ============================================================ INLINE TEXT EDIT */
.editable-text { position: absolute; inset: 0; border: none; outline: none; background: transparent; font-family: var(--mono); font-size: 0.75rem; color: var(--ink); padding: 4px; resize: none; display: none; }
.editable-text.active { display: block; }

/* ============================================================ SELECTION BOX */
.sel-box { position: absolute; border: 1.5px solid var(--accent); background: rgba(37,99,235,0.05); pointer-events: none; z-index: 999; }

/* ============================================================ CONTEXT MENU */
.ctx-menu { position: fixed; background: var(--paper); border: 1px solid var(--wire); border-radius: var(--radius); padding: 4px; z-index: 9999; box-shadow: var(--shadow-lg); min-width: 160px; }
.ctx-item { padding: 6px 12px; font-size: 0.78rem; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.1s; }
.ctx-item:hover { background: var(--accent-light); color: var(--accent); }
.ctx-item.danger:hover { background: rgba(220,38,38,0.08); color: var(--accent-2); }
.ctx-sep { height: 1px; background: var(--wire); margin: 3px 0; }
.ctx-key { margin-left: auto; font-family: var(--mono); font-size: 0.65rem; color: var(--ink-3); }

/* ============================================================ TOAST */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 0.78rem; font-family: var(--mono); z-index: 9999; opacity: 0; transition: all 0.25s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ============================================================ SCROLLBAR */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--wire); border-radius: 3px; }

/* ============================================================ RULER */
.ruler-h, .ruler-v { position: absolute; background: var(--paper-2); pointer-events: none; z-index: 10; }
.ruler-h { top: 0; left: 20px; right: 0; height: 20px; border-bottom: 1px solid var(--wire); overflow: hidden; }
.ruler-v { top: 20px; left: 0; bottom: 0; width: 20px; border-right: 1px solid var(--wire); overflow: hidden; }
.ruler-corner { position: absolute; top: 0; left: 0; width: 20px; height: 20px; background: var(--paper-2); border-right: 1px solid var(--wire); border-bottom: 1px solid var(--wire); z-index: 11; }
</style>
</head>
<body>

<div class="app" id="app">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon"></div>
      SKETCH
    </div>
    <div class="header-sep"></div>

    <!-- Tools -->
    <div class="tool-group">
      <button class="tool-btn active" id="toolSelect" data-tool="select" title="">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-7 1-4 7z"/></svg>
        <span class="tool-tip">Sélection (V)</span>
      </button>
      <button class="tool-btn" id="toolRect" data-tool="rect" title="">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        <span class="tool-tip">Rectangle (R)</span>
      </button>
      <button class="tool-btn" id="toolText" data-tool="text" title="">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>
        <span class="tool-tip">Texte (T)</span>
      </button>
      <button class="tool-btn" id="toolFrame" data-tool="frame" title="">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M7 2v20M17 2v20M2 7h5M2 17h5M17 7h5M17 17h5"/></svg>

  <aside class="left-panel">
    <div class="panel-section">

      </div>

    </div>

  <!-- CANVAS -->
  <div class="canvas-area tool-select" id="canvasArea">
    <div class="ruler-corner"></div>
    <div class="ruler-h" id="rulerH"><canvas id="rulerHCanvas"></canvas></div>
    <div class="ruler-v" id="rulerV"><canvas id="rulerVCanvas"></canvas></div>
    <canvas id="mainCanvas"></canvas>

    <div class="sel-box" id="selBox" style="display:none;"></div>

    <div id="noSelection" class="no-selection">
      <div class="no-sel-icon">⊹</div>
      <div class="no-sel-text">Sélectionnez un élément<br>pour modifier ses propriétés</div>
    </div>
    <div id="propsPanel" style="display:none;">
      <!-- Populated by JS -->
    </div>
  </aside>
</div>

<!-- CONTEXT MENU -->
<div class="ctx-menu" id="ctxMenu" style="display:none;"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- Hidden inputs -->
<input type="file" id="importFileInput" accept=".json" style="display:none;">
<input type="color" id="colorPicker" style="opacity:0;position:absolute;pointer-events:none;">

<script>
'use strict';
// ============================================================
// SKETCH — Core Engine
// ============================================================

const $ = id => document.getElementById(id);
const CANVAS = $('canvasArea');
const EL_CONTAINER = $('elementsContainer');

// ============================================================ STATE
const S = {
  elements: [],
  selected: [],
  tool: 'select',
  zoom: 1,
  panX: 0,
  panY: 0,
  history: [],
  future: [],
  dragging: false,
  resizing: false,
  panning: false,
  drawing: false,
  drawStart: null,
  nextId: 1,
};

// ============================================================ COMPONENTS DEFINITION
const COMPONENTS = [
  { type: 'button', label: 'Bouton', icon: '⬜', w: 120, h: 40,
    preview: '<div class="prev-btn"></div>' },
  { type: 'input', label: 'Champ', icon: '▭', w: 200, h: 40,
    preview: '<div class="prev-input"></div>' },
  { type: 'text', label: 'Texte', icon: '¶', w: 200, h: 60,
    preview: '<div class="prev-text"><span></span><span></span><span></span></div>' },
  { type: 'image', label: 'Image', icon: '⬡', w: 160, h: 120,
    preview: '<div class="prev-image"></div>' },
  { type: 'nav', label: 'Nav Bar', icon: '≡', w: 300, h: 48,
    preview: '<div class="prev-nav"></div>' },
  { type: 'card', label: 'Carte', icon: '⬭', w: 180, h: 220,
    preview: '<div class="prev-card"></div>' },
  { type: 'table', label: 'Tableau', icon: '⊞', w: 280, h: 160,
    preview: '<div class="prev-table"><span></span><span></span><span></span></div>' },
  { type: 'modal', label: 'Modal', icon: '⧉', w: 280, h: 200,
    preview: '<div class="prev-modal"></div>' },
  { type: 'heading', label: 'Titre', icon: 'H', w: 200, h: 40,
    preview: '<div style="font-family:var(--mono);font-size:0.8rem;font-weight:700;color:var(--ink-3)">Titre</div>' },
  { type: 'frame', label: 'Frame', icon: '⬚', w: 320, h: 240,
    preview: '<div style="width:80%;height:28px;border:2px solid var(--ink-3);border-radius:4px;"></div>' },
  { type: 'rect', label: 'Rect.', icon: '▭', w: 120, h: 80,
    preview: '<div style="width:70%;height:24px;background:var(--paper-3);border:1.5px solid var(--ink-4);border-radius:3px;"></div>' },
  { type: 'toggle', label: 'Toggle', icon: '⊙', w: 100, h: 30,
    preview: '<div class="prev-toggle"></div>' },
  { type: 'checkbox', label: 'Case', icon: '☑', w: 120, h: 30,
    preview: '<div class="prev-check"><span></span><div style="height:4px;width:40px;background:var(--ink-4);border-radius:2px;"></div></div>' },
  { type: 'avatar', label: 'Avatar', icon: '○', w: 56, h: 56,
    preview: '<div class="prev-avatar"></div>' },
  { type: 'badge', label: 'Badge', icon: '◉', w: 60, h: 24,
    preview: '<div class="prev-badge"></div>' },
  { type: 'divider', label: 'Div.', icon: '—', w: 200, h: 20,
    preview: '<div class="prev-divider"></div>' },
  { type: 'progress', label: 'Progrès', icon: '▰', w: 200, h: 28,
    preview: '<div class="prev-progress"></div>' },
  { type: 'note', label: 'Note', icon: '✎', w: 160, h: 120,
    preview: '<div style="width:80%;height:28px;background:#fef9c3;border:1px solid #fde047;border-radius:3px;"></div>' },
];

// ============================================================ RENDER COMPONENT HTML
function renderElHTML(el) {
  switch (el.type) {
    case 'button': return `<div class="wf-btn">${el.label || 'Bouton'}</div>`;
    case 'input': return `<div class="wf-input">${el.placeholder || 'Placeholder...'}</div>`;
    case 'text': return `<div class="wf-text"><span></span><span></span><span></span></div>`;
    case 'image': return `<div class="wf-image"></div>`;
    case 'nav': return `<div class="wf-nav"><span></span><span></span><span></span><span></span></div>`;
    case 'card': return `<div class="wf-card"><div class="wf-card-img"></div><div class="wf-card-body"><span></span><span></span></div></div>`;
    case 'table': return `<div class="wf-table">${Array(4).fill(0).map((_, i) => `<div class="wf-table-row">${Array(3).fill(0).map(() => `<div class="wf-table-cell"></div>`).join('')}</div>`).join('')}</div>`;
    case 'modal': return `<div class="wf-modal"><div class="wf-modal-hdr"><span></span></div><div class="wf-modal-body"><span></span><span></span><span></span></div></div>`;
    case 'heading': return `<div class="wf-heading"><span></span></div>`;
    case 'frame': return `<div class="wf-frame"><div class="wf-frame-label">${el.label || 'Frame'}</div></div>`;
    case 'rect': return `<div class="wf-rect"></div>`;
    case 'toggle': return `<div class="wf-toggle"><div class="wf-toggle-track"><div class="wf-toggle-thumb"></div></div><div class="wf-toggle-lbl">${el.label || 'Toggle'}</div></div>`;
    case 'checkbox': return `<div class="wf-checkbox"><div class="wf-checkbox-box">✓</div><div class="wf-checkbox-lbl">${el.label || 'Option'}</div></div>`;
    case 'avatar': return `<div class="wf-avatar">◎</div>`;
    case 'badge': return `<div class="wf-badge">${el.label || 'New'}</div>`;
    case 'divider': return `<div class="wf-divider"></div>`;
    case 'progress': return `<div class="wf-progress"><div class="wf-progress-track"><div class="wf-progress-bar"></div></div></div>`;
    case 'note': return `<div class="wf-note">${el.text || '📝 Note...'}</div>`;
    default: return `<div class="wf-rect"></div>`;
  }
}

// ============================================================ CREATE ELEMENT
function createElement(type, x, y, w, h, extra = {}) {
  const comp = COMPONENTS.find(c => c.type === type);
  const el = {
    id: 'el_' + (S.nextId++),
    type,
    x: Math.round(x),
    y: Math.round(y),
    w: w || (comp ? comp.w : 120),
    h: h || (comp ? comp.h : 40),
    opacity: 1,
    locked: false,
    visible: true,
    label: comp ? comp.label : type,
    ...extra,
  };
  S.elements.push(el);
  renderElement(el);
  renderLayers();
  return el;
}

function renderElement(el) {
  let dom = document.getElementById(el.id);
  if (!dom) {
    dom = document.createElement('div');
    dom.id = el.id;
    dom.className = 'wire-el';
    EL_CONTAINER.appendChild(dom);
    addElListeners(dom);
  }

  dom.style.cssText = `
    left: ${toScreen(el.x, el.y).x}px;
    top: ${toScreen(el.x, el.y).y}px;
    width: ${el.w * S.zoom}px;
    height: ${el.h * S.zoom}px;
    opacity: ${el.opacity};
    display: ${el.visible ? 'block' : 'none'};
    z-index: ${S.elements.indexOf(el) + 1};
    transform: scale(${S.zoom}); transform-origin: top left;
    position: absolute;
  `;
  // Actually use direct positioning without transform to avoid compounding
  dom.style.left = (el.x * S.zoom + S.panX) + 'px';
  dom.style.top  = (el.y * S.zoom + S.panY) + 'px';
  dom.style.width = el.w + 'px';
  dom.style.height = el.h + 'px';
  dom.style.transform = `scale(${S.zoom})`;
  dom.style.transformOrigin = 'top left';
  dom.style.opacity = el.opacity;
  dom.style.display = el.visible ? 'block' : 'none';
  dom.style.zIndex = S.elements.indexOf(el) + 1;

  const isSelected = S.selected.includes(el.id);
  if (isSelected) dom.classList.add('selected'); else dom.classList.remove('selected');

  dom.innerHTML = `
    <div class="el-inner">${renderElHTML(el)}</div>
    <div class="resize-handle rh-nw" data-rh="nw"></div>
    <div class="resize-handle rh-n"  data-rh="n"></div>
    <div class="resize-handle rh-ne" data-rh="ne"></div>
    <div class="resize-handle rh-e"  data-rh="e"></div>
    <div class="resize-handle rh-se" data-rh="se"></div>
    <div class="resize-handle rh-s"  data-rh="s"></div>
    <div class="resize-handle rh-sw" data-rh="sw"></div>
    <div class="resize-handle rh-w"  data-rh="w"></div>
  `;

  // Re-add listeners after innerHTML replace
  addElListeners(dom);
}

function reRenderAll() {
  // Remove DOM elements not in S.elements
  Array.from(EL_CONTAINER.children).forEach(c => {
    if (!S.elements.find(e => e.id === c.id)) c.remove();
  });
  S.elements.forEach(el => renderElement(el));
}

// ============================================================ COORD HELPERS
function toCanvas(screenX, screenY) {
  const r = CANVAS.getBoundingClientRect();
  return {
    x: (screenX - r.left - S.panX) / S.zoom,
    y: (screenY - r.top - S.panY) / S.zoom,
  };
}

function toScreen(cx, cy) {
  return { x: cx * S.zoom + S.panX, y: cy * S.zoom + S.panY };
}

// ============================================================ ELEMENT LISTENERS
let dragState = null;

function addElListeners(dom) {
  dom.addEventListener('mousedown', onElMousedown);
  dom.querySelectorAll('.resize-handle').forEach(rh => {
    rh.addEventListener('mousedown', onResizeMousedown);
  });
}

function onElMousedown(e) {
  if (S.tool !== 'select') return;
  if (e.button === 2) return;
  e.stopPropagation();

  const el = S.elements.find(el => el.id === e.currentTarget.id);
  if (!el || el.locked) return;

  // Shift: toggle selection
  if (e.shiftKey) {
    if (S.selected.includes(el.id)) S.selected = S.selected.filter(i => i !== el.id);
    else S.selected.push(el.id);
  } else {
    if (!S.selected.includes(el.id)) S.selected = [el.id];
  }

  reRenderAll();
  updatePropsPanel();

  const startPos = toCanvas(e.clientX, e.clientY);
  const startEls = S.selected.map(id => {
    const el = S.elements.find(e => e.id === id);
    return { id, x: el.x, y: el.y };
  });

  dragState = { startPos, startEls, moved: false };

  const onMove = e2 => {
    const cur = toCanvas(e2.clientX, e2.clientY);
    const dx = cur.x - dragState.startPos.x;
    const dy = cur.y - dragState.startPos.y;
    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragState.moved = true;
    if (!dragState.moved) return;

    dragState.startEls.forEach(({ id, x, y }) => {
      const el = S.elements.find(e => e.id === id);
      if (el) { el.x = Math.round(x + dx); el.y = Math.round(y + dy); }
    });
    reRenderAll();
    updatePropsPanel();
  };

  const onUp = () => {
    if (dragState && dragState.moved) saveHistory();
    dragState = null;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ============================================================ RESIZE
let resizeState = null;

function onResizeMousedown(e) {
  if (S.tool !== 'select') return;
  e.stopPropagation();
  e.preventDefault();

  const dom = e.currentTarget.closest('.wire-el');
  const el = S.elements.find(e => e.id === dom.id);
  if (!el) return;

  const dir = e.currentTarget.dataset.rh;
  const startPos = toCanvas(e.clientX, e.clientY);
  const snap = { x: el.x, y: el.y, w: el.w, h: el.h };

  const onMove = e2 => {
    const cur = toCanvas(e2.clientX, e2.clientY);
    const dx = cur.x - startPos.x;
    const dy = cur.y - startPos.y;
    let { x, y, w, h } = snap;
    const MIN = 20;

    if (dir.includes('e')) w = Math.max(MIN, w + dx);
    if (dir.includes('s')) h = Math.max(MIN, h + dy);
    if (dir.includes('w')) { x = x + dx; w = Math.max(MIN, w - dx); }
    if (dir.includes('n')) { y = y + dy; h = Math.max(MIN, h - dy); }

    el.x = Math.round(x); el.y = Math.round(y);
    el.w = Math.round(w); el.h = Math.round(h);
    reRenderAll();
    updatePropsPanel();
  };

  const onUp = () => {
    saveHistory();
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ============================================================ CANVAS EVENTS
let selBoxState = null;

CANVAS.addEventListener('mousedown', e => {
  if (e.button === 1 || S.tool === 'pan') {
    startPan(e); return;
  }
  if (e.button === 2) return;

  if (S.tool === 'select') {
    // Deselect
    S.selected = [];
    reRenderAll();
    updatePropsPanel();

    // Start selection box
    const r = CANVAS.getBoundingClientRect();
    selBoxState = { sx: e.clientX - r.left, sy: e.clientY - r.top };
    const box = $('selBox');
    box.style.display = 'block';
    box.style.left = selBoxState.sx + 'px';
    box.style.top = selBoxState.sy + 'px';
    box.style.width = '0';
    box.style.height = '0';
  }

  if (S.tool === 'rect' || S.tool === 'frame') {
    const pos = toCanvas(e.clientX, e.clientY);
    S.drawing = true;
    S.drawStart = pos;
  }

  if (S.tool === 'text') {
    const pos = toCanvas(e.clientX, e.clientY);
    const el = createElement('note', pos.x, pos.y, 160, 80, { text: 'Texte libre...' });
    S.selected = [el.id];
    reRenderAll();
    updatePropsPanel();
    saveHistory();
  }
});

CANVAS.addEventListener('mousemove', e => {
  if (selBoxState) {
    const r = CANVAS.getBoundingClientRect();
    const cx = e.clientX - r.left;
    const cy = e.clientY - r.top;
    const x = Math.min(selBoxState.sx, cx);
    const y = Math.min(selBoxState.sy, cy);
    const w = Math.abs(cx - selBoxState.sx);
    const h = Math.abs(cy - selBoxState.sy);
    const box = $('selBox');
    box.style.left = x + 'px'; box.style.top = y + 'px';
    box.style.width = w + 'px'; box.style.height = h + 'px';

    // Select elements within box
    const bx1 = (x - S.panX) / S.zoom, by1 = (y - S.panY) / S.zoom;
    const bx2 = bx1 + w / S.zoom, by2 = by1 + h / S.zoom;
    S.selected = S.elements
      .filter(el => el.x >= bx1 && el.y >= by1 && el.x + el.w <= bx2 && el.y + el.h <= by2)
      .map(el => el.id);
    reRenderAll();
    updatePropsPanel();
  }
});

CANVAS.addEventListener('mouseup', e => {
  if (selBoxState) {
    selBoxState = null;
    $('selBox').style.display = 'none';
  }
  if (S.drawing) {
    S.drawing = false;
    const pos = toCanvas(e.clientX, e.clientY);
    const x = Math.min(S.drawStart.x, pos.x);
    const y = Math.min(S.drawStart.y, pos.y);
    const w = Math.max(40, Math.abs(pos.x - S.drawStart.x));
    const h = Math.max(20, Math.abs(pos.y - S.drawStart.y));
    const type = S.tool === 'frame' ? 'frame' : 'rect';
    const el = createElement(type, x, y, w, h);
    S.selected = [el.id];
    reRenderAll(); updatePropsPanel(); saveHistory();
    setTool('select');
  }
});

// ============================================================ PAN
function startPan(e) {
  const startX = e.clientX, startY = e.clientY;
  const px = S.panX, py = S.panY;
  CANVAS.classList.add('panning');

  const onMove = e2 => {
    S.panX = px + (e2.clientX - startX);
    S.panY = py + (e2.clientY - startY);
    reRenderAll();
  };
  const onUp = () => {
    CANVAS.classList.remove('panning');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ============================================================ ZOOM
CANVAS.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.1 : 0.1;
  const newZoom = Math.max(0.2, Math.min(3, S.zoom + delta));

  const r = CANVAS.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  S.panX = mx - (mx - S.panX) * (newZoom / S.zoom);
  S.panY = my - (my - S.panY) * (newZoom / S.zoom);
  S.zoom = newZoom;

  reRenderAll();
  $('zoomDisplay').textContent = Math.round(S.zoom * 100) + '%';
}, { passive: false });

// ============================================================ DRAG FROM PANEL
const compGrid = $('compGrid');
COMPONENTS.forEach(comp => {
  const item = document.createElement('div');
  item.className = 'comp-item';
  item.draggable = true;
  item.dataset.type = comp.type;
  item.innerHTML = `<div class="comp-preview">${comp.preview}</div><div class="comp-label">${comp.label}</div>`;
  item.addEventListener('dragstart', e => {
    e.dataTransfer.setData('comp-type', comp.type);
  });
  compGrid.appendChild(item);
});

CANVAS.addEventListener('dragover', e => e.preventDefault());
CANVAS.addEventListener('drop', e => {
  e.preventDefault();
  const type = e.dataTransfer.getData('comp-type');
  if (!type) return;
  const pos = toCanvas(e.clientX, e.clientY);
  const el = createElement(type, pos.x - 60, pos.y - 30);
  S.selected = [el.id];
  reRenderAll(); updatePropsPanel(); saveHistory();
});

// ============================================================ CONTEXT MENU
CANVAS.addEventListener('contextmenu', e => {
  e.preventDefault();
  const el = S.selected.length === 1 ? S.elements.find(e => e.id === S.selected[0]) : null;
  showCtxMenu(e.clientX, e.clientY, el);
});

function showCtxMenu(x, y, el) {
  const menu = $('ctxMenu');
  const items = [];

  if (el) {
    items.push({ label: '✎ Renommer', fn: () => renameEl(el) });
    items.push({ label: '⧉ Dupliquer', key: 'Ctrl+D', fn: () => duplicateSelected() });
    items.push('sep');
    items.push({ label: '↑ Premier plan', fn: () => { bringToFront(el); saveHistory(); } });
    items.push({ label: '↓ Arrière-plan', fn: () => { sendToBack(el); saveHistory(); } });
    items.push('sep');
    items.push({ label: el.locked ? '🔓 Déverrouiller' : '🔒 Verrouiller', fn: () => { el.locked = !el.locked; reRenderAll(); } });
    items.push({ label: el.visible ? '👁 Masquer' : '👁 Afficher', fn: () => { el.visible = !el.visible; reRenderAll(); renderLayers(); } });
    items.push('sep');
    items.push({ label: '🗑 Supprimer', cls: 'danger', fn: () => deleteSelected() });
  } else {
    items.push({ label: '⊕ Coller (Ctrl+V)', fn: () => {} });
    items.push({ label: '⊞ Tout sélectionner', fn: () => { S.selected = S.elements.map(e => e.id); reRenderAll(); updatePropsPanel(); } });
  }

  menu.innerHTML = items.map(i => {
    if (i === 'sep') return '<div class="ctx-sep"></div>';
    return `<div class="ctx-item ${i.cls || ''}">${i.label}${i.key ? `<span class="ctx-key">${i.key}</span>` : ''}</div>`;
  }).join('');

  menu.style.display = 'block';
  menu.style.left = Math.min(x, window.innerWidth - 180) + 'px';
  menu.style.top  = Math.min(y, window.innerHeight - 200) + 'px';

  const itemEls = menu.querySelectorAll('.ctx-item');
  const fnItems = items.filter(i => i !== 'sep');
  itemEls.forEach((el, i) => {
    el.addEventListener('click', () => { fnItems[i].fn(); hideCtxMenu(); });
  });
}

function hideCtxMenu() { $('ctxMenu').style.display = 'none'; }
document.addEventListener('click', hideCtxMenu);
document.addEventListener('keydown', e => { if (e.key === 'Escape') hideCtxMenu(); });

// ============================================================ PROPERTIES PANEL
function updatePropsPanel() {
  const panel = $('propsPanel');
  const noSel = $('noSelection');

  if (S.selected.length === 0) {
    panel.style.display = 'none';
    noSel.style.display = 'block';
    return;
  }

  noSel.style.display = 'none';
  panel.style.display = 'block';

  const el = S.elements.find(e => e.id === S.selected[0]);
  if (!el) return;

  panel.innerHTML = `
    <div class="prop-section">
      <div class="panel-title">Disposition</div>
      <div class="prop-row-2">
        <div>
          <div class="prop-label" style="margin-bottom:4px;">X</div>
          <input class="prop-input" id="px" type="number" value="${Math.round(el.x)}">
        </div>
        <div>
          <div class="prop-label" style="margin-bottom:4px;">Y</div>
          <input class="prop-input" id="py" type="number" value="${Math.round(el.y)}">
        </div>
      </div>
      <div class="prop-row-2">
        <div>
          <div class="prop-label" style="margin-bottom:4px;">L</div>
          <input class="prop-input" id="pw" type="number" value="${Math.round(el.w)}">
        </div>
        <div>
          <div class="prop-label" style="margin-bottom:4px;">H</div>
          <input class="prop-input" id="ph" type="number" value="${Math.round(el.h)}">
        </div>
      </div>
    </div>
    <div class="prop-section">
      <div class="panel-title">Apparence</div>
      <div class="prop-row">
        <span class="prop-label">Opacité</span>
        <input class="prop-input" id="popacity" type="range" min="0" max="1" step="0.05" value="${el.opacity}" style="flex:1;">
        <span style="font-family:var(--mono);font-size:0.68rem;color:var(--ink-3);min-width:30px;text-align:right;" id="opacityVal">${Math.round(el.opacity*100)}%</span>
      </div>
    </div>
    <div class="prop-section">
      <div class="panel-title">Label</div>
      <div class="prop-row">
        <input class="prop-input" id="plabel" type="text" value="${el.label || ''}" placeholder="Nom de l'élément">
      </div>
    </div>
    <div class="prop-section">
      <div class="panel-title">Aligner</div>
      <div class="align-btns">
        <button class="align-btn" data-align="left" title="Gauche">⊣</button>
        <button class="align-btn" data-align="center" title="Centrer H">⊕</button>
        <button class="align-btn" data-align="right" title="Droite">⊢</button>
        <button class="align-btn" data-align="top" title="Haut">⊤</button>
        <button class="align-btn" data-align="middle" title="Centrer V">⊞</button>
        <button class="align-btn" data-align="bottom" title="Bas">⊥</button>
      </div>
    </div>
    <div class="prop-section">
      <div class="panel-title">Infos</div>
      <div class="prop-row"><span class="prop-label">Type</span><span style="font-family:var(--mono);font-size:0.72rem;color:var(--ink-3);">${el.type}</span></div>
      <div class="prop-row"><span class="prop-label">ID</span><span style="font-family:var(--mono);font-size:0.65rem;color:var(--ink-4);">${el.id}</span></div>
    </div>
  `;

  // Bind inputs
  const bind = (id, key, parse) => {
    const input = $(id);
    if (!input) return;
    input.addEventListener('change', () => {
      const val = parse ? parse(input.value) : input.value;
      S.selected.forEach(sid => {
        const el = S.elements.find(e => e.id === sid);
        if (el) el[key] = val;
      });
      reRenderAll();
      saveHistory();
    });
  };
  bind('px', 'x', parseFloat);
  bind('py', 'y', parseFloat);
  bind('pw', 'w', v => Math.max(10, parseFloat(v)));
  bind('ph', 'h', v => Math.max(10, parseFloat(v)));
  bind('plabel', 'label');

  const opSlider = $('popacity');
  if (opSlider) {
    opSlider.addEventListener('input', () => {
      const v = parseFloat(opSlider.value);
      $('opacityVal').textContent = Math.round(v * 100) + '%';
      S.selected.forEach(sid => {
        const el = S.elements.find(e => e.id === sid);
        if (el) el.opacity = v;
      });
      reRenderAll();
    });
    opSlider.addEventListener('change', saveHistory);
  }

  // Align btns
  panel.querySelectorAll('.align-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const dir = btn.dataset.align;
      const r = CANVAS.getBoundingClientRect();
      const cw = r.width / S.zoom, ch = r.height / S.zoom;
      S.selected.forEach(sid => {
        const el = S.elements.find(e => e.id === sid);
        if (!el) return;
        if (dir === 'left') el.x = 0;
        else if (dir === 'center') el.x = (cw - el.w) / 2;
        else if (dir === 'right') el.x = cw - el.w;
        else if (dir === 'top') el.y = 0;
        else if (dir === 'middle') el.y = (ch - el.h) / 2;
        else if (dir === 'bottom') el.y = ch - el.h;
      });
      reRenderAll(); updatePropsPanel(); saveHistory();
    });
  });
}

// ============================================================ LAYERS
function renderLayers() {
  const list = $('layersList');
  const icons = {
    button:'⬜', input:'▭', text:'¶', image:'⬡', nav:'≡', card:'⬭',
    table:'⊞', modal:'⧉', heading:'H', frame:'⬚', rect:'▭',
    toggle:'⊙', checkbox:'☑', avatar:'○', badge:'◉', divider:'—',
    progress:'▰', note:'✎',
  };
  list.innerHTML = [...S.elements].reverse().map(el => `
    <div class="layer-item ${S.selected.includes(el.id) ? 'selected' : ''}" data-id="${el.id}">
      <span class="layer-icon">${icons[el.type] || '◈'}</span>
      <span class="layer-name">${el.label || el.type}</span>
      <span class="layer-vis">${el.visible ? '👁' : '○'}</span>
    </div>
  `).join('');

  list.querySelectorAll('.layer-item').forEach(item => {
    item.addEventListener('click', e => {
      const id = item.dataset.id;
      if (e.shiftKey) {
        if (S.selected.includes(id)) S.selected = S.selected.filter(i => i !== id);
        else S.selected.push(id);
      } else {
        S.selected = [id];
      }
      reRenderAll(); updatePropsPanel(); renderLayers();
    });
    item.querySelector('.layer-vis').addEventListener('click', e => {
      e.stopPropagation();
      const el = S.elements.find(el => el.id === item.dataset.id);
      if (el) { el.visible = !el.visible; reRenderAll(); renderLayers(); }
    });
  });
}

// ============================================================ HISTORY
function saveHistory() {
  S.history.push(JSON.stringify(S.elements.map(e => ({...e}))));
  if (S.history.length > 60) S.history.shift();
  S.future = [];
  renderLayers();
}

function undo() {
  if (S.history.length === 0) return;
  S.future.push(JSON.stringify(S.elements.map(e => ({...e}))));
  const prev = JSON.parse(S.history.pop());
  S.elements = prev;
  S.selected = S.selected.filter(id => S.elements.find(e => e.id === id));
  S.nextId = Math.max(...S.elements.map(e => parseInt(e.id.split('_')[1]) || 0), 0) + 1;
  reRenderAll(); updatePropsPanel(); renderLayers();
}

function redo() {
  if (S.future.length === 0) return;
  S.history.push(JSON.stringify(S.elements.map(e => ({...e}))));
  const next = JSON.parse(S.future.pop());
  S.elements = next;
  S.selected = S.selected.filter(id => S.elements.find(e => e.id === id));
  S.nextId = Math.max(...S.elements.map(e => parseInt(e.id.split('_')[1]) || 0), 0) + 1;
  reRenderAll(); updatePropsPanel(); renderLayers();
}

// ============================================================ TOOLS
function setTool(t) {
  S.tool = t;
  document.querySelectorAll('.tool-btn[data-tool]').forEach(b => {
    b.classList.toggle('active', b.dataset.tool === t);
  });
  CANVAS.className = `canvas-area tool-${t}`;
}

document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => setTool(btn.dataset.tool));
});

// ============================================================ ACTIONS
function deleteSelected() {
  S.elements = S.elements.filter(e => !S.selected.includes(e.id));
  S.selected.forEach(id => { const d = document.getElementById(id); if (d) d.remove(); });
  S.selected = [];
  updatePropsPanel(); renderLayers(); saveHistory();
}

function duplicateSelected() {
  const newSel = [];
  S.selected.forEach(id => {
    const el = S.elements.find(e => e.id === id);
    if (!el) return;
    const copy = { ...el, id: 'el_' + (S.nextId++), x: el.x + 20, y: el.y + 20 };
    S.elements.push(copy);
    newSel.push(copy.id);
  });
  S.selected = newSel;
  reRenderAll(); updatePropsPanel(); renderLayers(); saveHistory();
}

function bringToFront(el) {
  S.elements = S.elements.filter(e => e.id !== el.id);
  S.elements.push(el);
  reRenderAll(); renderLayers();
}

function sendToBack(el) {
  S.elements = S.elements.filter(e => e.id !== el.id);
  S.elements.unshift(el);
  reRenderAll(); renderLayers();
}

function renameEl(el) {
  const name = prompt('Nouveau nom :', el.label || el.type);
  if (name !== null) { el.label = name; reRenderAll(); renderLayers(); updatePropsPanel(); saveHistory(); }
}

// ============================================================ KEYBOARD
document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;

  if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redo(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'd') { e.preventDefault(); duplicateSelected(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'a') { e.preventDefault(); S.selected = S.elements.map(e => e.id); reRenderAll(); updatePropsPanel(); }
  if (e.key === 'v') setTool('select');
  if (e.key === 'r') setTool('rect');
  if (e.key === 't') setTool('text');
  if (e.key === 'f') setTool('frame');
  if (e.key === 'h') setTool('pan');

  // Arrow nudge
  const STEP = e.shiftKey ? 10 : 1;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
    e.preventDefault();
    S.selected.forEach(id => {
      const el = S.elements.find(e => e.id === id);
      if (!el) return;
      if (e.key === 'ArrowLeft') el.x -= STEP;
      if (e.key === 'ArrowRight') el.x += STEP;
      if (e.key === 'ArrowUp') el.y -= STEP;
      if (e.key === 'ArrowDown') el.y += STEP;
    });
    reRenderAll(); updatePropsPanel();
  }
});

// ============================================================ HEADER BUTTONS
$('btnUndo').addEventListener('click', undo);
$('btnRedo').addEventListener('click', redo);
$('btnDuplicate').addEventListener('click', duplicateSelected);
$('btnDelete').addEventListener('click', deleteSelected);
$('btnZoomIn').addEventListener('click', () => { S.zoom = Math.min(3, S.zoom + 0.1); reRenderAll(); $('zoomDisplay').textContent = Math.round(S.zoom * 100) + '%'; });
$('btnZoomOut').addEventListener('click', () => { S.zoom = Math.max(0.2, S.zoom - 0.1); reRenderAll(); $('zoomDisplay').textContent = Math.round(S.zoom * 100) + '%'; });

$('btnClear').addEventListener('click', () => {
  if (S.elements.length === 0 || confirm('Effacer tout le canvas ?')) {
    saveHistory();
    S.elements = [];
    S.selected = [];
    EL_CONTAINER.innerHTML = '';
    renderLayers(); updatePropsPanel();
  }
});

// ============================================================ EXPORT PNG
$('btnExportPNG').addEventListener('click', () => {
  const r = CANVAS.getBoundingClientRect();
  const canvas = document.createElement('canvas');
  canvas.width = r.width * window.devicePixelRatio;
  canvas.height = r.height * window.devicePixelRatio;
  const ctx = canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx.fillStyle = '#f5f2ec';
  ctx.fillRect(0, 0, r.width, r.height);

  // html2canvas workaround: use dom-to-image via blob
  // Simplified: notify user
  showToast('PNG : utilisez Ctrl+Shift+S (capture navigateur) pour exporter');
});

// ============================================================ EXPORT / IMPORT JSON
$('btnExportJSON').addEventListener('click', () => {
  const data = JSON.stringify({ elements: S.elements, nextId: S.nextId }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'sketch_export.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Projet exporté en JSON');
});

$('btnImportJSON').addEventListener('click', () => $('importFileInput').click());
$('importFileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      saveHistory();
      S.elements = data.elements || [];
      S.nextId = data.nextId || S.nextId;
      S.selected = [];
      EL_CONTAINER.innerHTML = '';
      reRenderAll(); renderLayers(); updatePropsPanel();
      showToast('✓ Projet importé');
    } catch { showToast('Erreur : JSON invalide'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ============================================================ TOAST
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ============================================================ RULERS (Canvas-based)
function drawRulers() {
  const rh = $('rulerHCanvas');
  const rv = $('rulerVCanvas');
  const area = CANVAS.getBoundingClientRect();
  const W = area.width - 20, H = area.height - 20;

  rh.width = W; rh.height = 20;
  rv.width = 20; rv.height = H;

  const ctxH = rh.getContext('2d');
  const ctxV = rv.getContext('2d');

  ctxH.fillStyle = '#ede9e0';
  ctxH.fillRect(0, 0, W, 20);
  ctxV.fillStyle = '#ede9e0';
  ctxV.fillRect(0, 0, 20, H);

  ctxH.strokeStyle = '#c8c3bc';
  ctxH.fillStyle = '#8a857e';
  ctxH.font = '8px DM Mono, monospace';
  ctxH.textAlign = 'center';

  ctxV.strokeStyle = '#c8c3bc';
  ctxV.fillStyle = '#8a857e';
  ctxV.font = '8px DM Mono, monospace';
  ctxV.textAlign = 'right';

  const step = S.zoom > 1.5 ? 50 : S.zoom > 0.7 ? 100 : 200;
  const startX = Math.floor(-S.panX / S.zoom / step) * step;
  const startY = Math.floor(-S.panY / S.zoom / step) * step;

  for (let x = startX; x < startX + W / S.zoom + step; x += step) {
    const sx = x * S.zoom + S.panX;
    if (sx < 0 || sx > W) continue;
    ctxH.beginPath(); ctxH.moveTo(sx, 14); ctxH.lineTo(sx, 20); ctxH.stroke();
    ctxH.fillText(x, sx, 11);
  }
  for (let y = startY; y < startY + H / S.zoom + step; y += step) {
    const sy = y * S.zoom + S.panY;
    if (sy < 0 || sy > H) continue;
    ctxV.beginPath(); ctxV.moveTo(14, sy); ctxV.lineTo(20, sy); ctxV.stroke();
    ctxV.save(); ctxV.translate(10, sy); ctxV.rotate(-Math.PI/2);
    ctxV.fillText(y, 0, 0); ctxV.restore();
  }
}

window.addEventListener('resize', () => { drawRulers(); });
// Draw rulers on pan/zoom
const _rrAll = reRenderAll;
const reRenderAll = () => { _rrAll(); drawRulers(); };

// ============================================================ STARTER CONTENT
function loadStarter() {
  createElement('nav',    20,  20, 360, 48);
  createElement('heading',20,  90, 220, 44);
  createElement('text',   20, 150, 280, 70);
  createElement('button', 20, 240, 120, 40);
  createElement('card',  320,  80, 180, 220);
  createElement('image', 320, 320, 180, 120);
  saveHistory();
}

// ============================================================ INIT
drawRulers();
loadStarter();
setTool('select');
updatePropsPanel();
renderLayers();
</script>
